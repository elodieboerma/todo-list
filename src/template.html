<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
</head>
<body>
    <header>
        <div id="buttons">
            <button id="newTaskButton">New Task</button>
            <button id="newProjectButton">New Project</button>
        </div>

        <div id="key">
            <div class="code">
                <div class="color" style="background-color: rgb(83, 250, 250);"></div>
                <div>ASAP</div>
            </div>
            <div class="code">
                <div class="color soon"></div>
                <div>Soon</div>
            </div>
            <div class="code">
                <div class="color asap"></div>
                <div>Sometime</div>
            </div>
        </div>
    </header>


    <div id="list"></div>
</body>
</html>
